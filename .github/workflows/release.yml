name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Publish RubyGem
    runs-on: ubuntu-latest
    environment: release

    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - run: bundle exec rake ci

      - run: bundle exec rake release:validate_tag

      - uses: rubygems/release-gem@v1
